<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NanoClaw Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:       #050a0f;
    --surface:  #0a1520;
    --border:   #0d2a3a;
    --accent:   #00d4ff;
    --accent2:  #00ff9d;
    --warn:     #ffb800;
    --error:    #ff3d5a;
    --muted:    #2a4a5a;
    --text:     #c8dde8;
    --text-dim: #4a7a8a;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Rajdhani', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 15px;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,212,255,0.015) 2px,
      rgba(0,212,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Grid background */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 16px 20px;
    gap: 14px;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 0 12px rgba(0,212,255,0.3), inset 0 0 8px rgba(0,212,255,0.05);
    animation: pulse-border 3s ease-in-out infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 12px rgba(0,212,255,0.3), inset 0 0 8px rgba(0,212,255,0.05); }
    50%       { box-shadow: 0 0 20px rgba(0,212,255,0.6), inset 0 0 12px rgba(0,212,255,0.1); }
  }

  .logo-text h1 {
    font-family: var(--sans);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    text-shadow: 0 0 20px rgba(0,212,255,0.5);
  }

  .logo-text span {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .clock {
    font-family: var(--mono);
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 3px;
    text-shadow: 0 0 15px rgba(0,212,255,0.4);
  }

  .date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 2px;
    text-align: right;
  }

  /* ── CARDS ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    flex-shrink: 0;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.4;
  }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  .card-main {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .status-dot.online {
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2), 0 0 16px rgba(0,255,157,0.3);
    animation: dot-pulse 2s ease-in-out infinite;
  }

  .status-dot.offline {
    background: var(--error);
    box-shadow: 0 0 8px var(--error);
  }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }

  .card-value {
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }

  .card-value.online  { color: var(--accent2); }
  .card-value.offline { color: var(--error); }

  .card-sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    min-height: 16px;
  }

  .card-number {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 400;
    color: var(--accent);
    text-shadow: 0 0 15px rgba(0,212,255,0.4);
    line-height: 1;
    margin-bottom: 4px;
  }

  /* ── LOG PANEL ── */
  .log-panel {
    flex: 1;
    min-height: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: rgba(0,212,255,0.03);
  }

  .log-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .log-title-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: dot-pulse 1.5s ease-in-out infinite;
  }

  .filter-btns {
    display: flex;
    gap: 6px;
  }

  .filter-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .filter-btn:hover                { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active               { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.08); }
  .filter-btn.active[data-f="warn"]  { border-color: var(--warn);  color: var(--warn);  background: rgba(255,184,0,0.08); }
  .filter-btn.active[data-f="error"] { border-color: var(--error); color: var(--error); background: rgba(255,61,90,0.08); }

  .log-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .autoscroll-btn {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 1px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--muted);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .autoscroll-btn.on { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,157,0.06); }

  .log-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* Log body */
  .log-body {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scroll-behavior: smooth;
  }

  .log-body::-webkit-scrollbar { width: 4px; }
  .log-body::-webkit-scrollbar-track { background: transparent; }
  .log-body::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

  .log-entry {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 3px 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    border-left: 2px solid transparent;
    transition: background 0.1s;
  }

  .log-entry:hover { background: rgba(255,255,255,0.02); }

  .log-entry[data-level="info"]  { border-left-color: transparent; }
  .log-entry[data-level="warn"]  { border-left-color: var(--warn);  background: rgba(255,184,0,0.03); }
  .log-entry[data-level="error"],
  .log-entry[data-level="fatal"] { border-left-color: var(--error); background: rgba(255,61,90,0.04); }

  .log-time {
    color: var(--text-dim);
    flex-shrink: 0;
    font-size: 11px;
  }

  .log-level {
    flex-shrink: 0;
    font-size: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    width: 36px;
    text-align: right;
  }

  .log-level.info  { color: var(--accent); }
  .log-level.warn  { color: var(--warn); }
  .log-level.error,
  .log-level.fatal { color: var(--error); }
  .log-level.debug { color: var(--text-dim); }

  .log-msg { color: var(--text); flex: 1; word-break: break-all; }
  .log-data { color: var(--text-dim); font-size: 11px; }

  /* ── FOOTER ── */
  footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .sse-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 1px;
  }

  .sse-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s, box-shadow 0.3s;
  }

  .sse-dot.connected    { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: dot-pulse 2s ease-in-out infinite; }
  .sse-dot.disconnected { background: var(--error); }
  .sse-dot.connecting   { background: var(--warn); animation: dot-pulse 0.8s ease-in-out infinite; }

  .sse-label.connected    { color: var(--accent2); }
  .sse-label.disconnected { color: var(--error); }
  .sse-label.connecting   { color: var(--warn); }

  .footer-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  /* entry animation */
  @keyframes slide-in {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .log-entry.new { animation: slide-in 0.15s ease-out forwards; }

  /* uptime shimmer */
  @keyframes shimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .uptime-val {
    font-family: var(--mono);
    font-size: 13px;
    background: linear-gradient(90deg, var(--text-dim) 0%, var(--accent) 40%, var(--text-dim) 60%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4s linear infinite;
  }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🐾</div>
      <div class="logo-text">
        <h1>NanoClaw Monitor</h1>
        <span>SYSTEM STATUS DASHBOARD</span>
      </div>
    </div>
    <div class="header-right">
      <div>
        <div class="clock" id="clock">--:--:--</div>
        <div class="date" id="date">----/--/--</div>
      </div>
    </div>
  </header>

  <!-- Status Cards -->
  <div class="cards">
    <!-- Card 1: Service -->
    <div class="card">
      <div class="card-label">Service Status</div>
      <div class="card-main">
        <div class="status-dot" id="svc-dot"></div>
        <div class="card-value" id="svc-status">--</div>
      </div>
      <div class="card-sub">
        运行时长 &nbsp;<span class="uptime-val" id="uptime">--</span>
      </div>
      <div class="card-sub" style="margin-top:4px">PID &nbsp;<span id="pid" style="color:var(--accent);font-family:var(--mono)">--</span></div>
    </div>

    <!-- Card 2: Discord -->
    <div class="card">
      <div class="card-label">Discord Connection</div>
      <div class="card-main">
        <div class="status-dot" id="dc-dot"></div>
        <div class="card-value" id="dc-status">--</div>
      </div>
      <div class="card-sub" id="dc-bot">Bot: --</div>
    </div>

    <!-- Card 3: Reconnects -->
    <div class="card">
      <div class="card-label">Reconnect Stats</div>
      <div class="card-number" id="reconnect-count">0</div>
      <div class="card-sub" style="margin-bottom:4px">total reconnects</div>
      <div class="card-sub">Last: <span id="last-reconnect" style="color:var(--text)">--</span></div>
    </div>
  </div>

  <!-- Log Panel -->
  <div class="log-panel">
    <div class="log-header">
      <div class="log-title">
        <div class="log-title-dot"></div>
        LIVE LOGS
      </div>
      <div class="log-controls">
        <div class="filter-btns">
          <button class="filter-btn active" data-f="all">ALL</button>
          <button class="filter-btn" data-f="info">INFO</button>
          <button class="filter-btn" data-f="warn">WARN</button>
          <button class="filter-btn" data-f="error">ERROR</button>
        </div>
        <button class="autoscroll-btn on" id="autoscroll-btn">↓ AUTO</button>
        <span class="log-count" id="log-count">0 entries</span>
      </div>
    </div>
    <div class="log-body" id="log-body"></div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="sse-status">
      <div class="sse-dot connecting" id="sse-dot"></div>
      <span class="sse-label connecting" id="sse-label">CONNECTING...</span>
    </div>
    <div class="footer-meta" id="footer-meta">NANOCLAW MONITOR v1.0</div>
  </footer>

</div>

<script>
// ── Clock ──────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toTimeString().slice(0, 8);
  document.getElementById('date').textContent =
    now.toLocaleDateString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' }).replace(/\//g, '/');
}
updateClock();
setInterval(updateClock, 1000);

// ── State ──────────────────────────────────────────────────
let autoScroll   = true;
let activeFilter = 'all';
let totalEntries = 0;
const MAX_ENTRIES = 500;
const logEntries  = []; // { level, time, msg, data, el }

// ── Uptime formatter ───────────────────────────────────────
function fmtUptime(secs) {
  if (secs == null) return '--';
  const d = Math.floor(secs / 86400);
  const h = Math.floor((secs % 86400) / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (d > 0) return `${d}d ${h}h ${m}m`;
  if (h > 0) return `${h}h ${m}m ${s}s`;
  return `${m}m ${s}s`;
}

// ── Status update ──────────────────────────────────────────
function applyStatus(st) {
  // Service
  const svcDot    = document.getElementById('svc-dot');
  const svcStatus = document.getElementById('svc-status');
  svcDot.className    = 'status-dot online';
  svcStatus.className = 'card-value online';
  svcStatus.textContent = 'ONLINE';

  document.getElementById('uptime').textContent = fmtUptime(st.uptime);
  if (st.pid) document.getElementById('pid').textContent = st.pid;

  // Discord
  const dcDot    = document.getElementById('dc-dot');
  const dcStatus = document.getElementById('dc-status');
  const connected = !!st.discord;
  dcDot.className    = 'status-dot ' + (connected ? 'online' : 'offline');
  dcStatus.className = 'card-value ' + (connected ? 'online' : 'offline');
  dcStatus.textContent = connected ? 'CONNECTED' : 'DISCONNECTED';
  document.getElementById('dc-bot').textContent =
    'Bot: ' + (st.botName || '--');

  // Reconnects
  document.getElementById('reconnect-count').textContent = st.reconnects ?? 0;
  document.getElementById('last-reconnect').textContent  = st.lastReconnect || '--';
}

// ── Log rendering ──────────────────────────────────────────
const logBody = document.getElementById('log-body');

function createLogEl(entry) {
  const el = document.createElement('div');
  el.className = `log-entry new`;
  el.dataset.level = entry.level;

  const dataStr = entry.data && Object.keys(entry.data).length
    ? ' ' + JSON.stringify(entry.data) : '';

  el.innerHTML =
    `<span class="log-time">${entry.time}</span>` +
    `<span class="log-level ${entry.level}">${entry.level.slice(0,5)}</span>` +
    `<span class="log-msg">${escHtml(entry.msg)}</span>` +
    (dataStr ? `<span class="log-data">${escHtml(dataStr)}</span>` : '');

  setTimeout(() => el.classList.remove('new'), 200);
  return el;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isVisible(level) {
  if (activeFilter === 'all')   return true;
  if (activeFilter === 'error') return level === 'error' || level === 'fatal';
  return level === activeFilter;
}

function appendLog(entry) {
  totalEntries++;
  const el = createLogEl(entry);
  el.style.display = isVisible(entry.level) ? '' : 'none';
  logEntries.push({ ...entry, el });

  // Trim to MAX_ENTRIES
  if (logEntries.length > MAX_ENTRIES) {
    const old = logEntries.shift();
    old.el.remove();
  }

  logBody.appendChild(el);
  updateCount();

  if (autoScroll) {
    logBody.scrollTop = logBody.scrollHeight;
  }
}

function applyFilter(f) {
  activeFilter = f;
  for (const e of logEntries) {
    e.el.style.display = isVisible(e.level) ? '' : 'none';
  }
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.f === f);
  });
  if (autoScroll) logBody.scrollTop = logBody.scrollHeight;
  updateCount();
}

function updateCount() {
  const visible = logEntries.filter(e => isVisible(e.level)).length;
  document.getElementById('log-count').textContent =
    `${visible} / ${logEntries.length} entries`;
}

// ── Autoscroll button ──────────────────────────────────────
const autoScrollBtn = document.getElementById('autoscroll-btn');
autoScrollBtn.addEventListener('click', () => {
  autoScroll = !autoScroll;
  autoScrollBtn.classList.toggle('on', autoScroll);
  autoScrollBtn.textContent = autoScroll ? '↓ AUTO' : '⏸ PAUSED';
  if (autoScroll) logBody.scrollTop = logBody.scrollHeight;
});

logBody.addEventListener('wheel', () => {
  const atBottom = logBody.scrollHeight - logBody.scrollTop - logBody.clientHeight < 30;
  if (!atBottom && autoScroll) {
    autoScroll = false;
    autoScrollBtn.classList.remove('on');
    autoScrollBtn.textContent = '⏸ PAUSED';
  }
});

// ── Filter buttons ─────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => applyFilter(btn.dataset.f));
});

// ── SSE connection ─────────────────────────────────────────
const sseDot   = document.getElementById('sse-dot');
const sseLabel = document.getElementById('sse-label');

function setSseState(state) {
  sseDot.className   = 'sse-dot ' + state;
  sseLabel.className = 'sse-label ' + state;
  const labels = { connected: 'SSE CONNECTED', disconnected: 'SSE DISCONNECTED', connecting: 'CONNECTING...' };
  sseLabel.textContent = labels[state] || state.toUpperCase();
}

// Load initial status
async function loadStatus() {
  try {
    const r = await fetch('/api/status');
    if (r.ok) {
      const st = await r.json();
      applyStatus(st);
    }
  } catch {}
}
loadStatus();

// SSE
let evtSrc = null;
let reconnectDelay = 1000;

function connectSSE() {
  setSseState('connecting');
  evtSrc = new EventSource('/api/stream');

  evtSrc.onopen = () => {
    setSseState('connected');
    reconnectDelay = 1000;
  };

  evtSrc.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'log') {
        appendLog(msg);
      } else if (msg.type === 'status') {
        applyStatus(msg);
      }
    } catch {}
  };

  evtSrc.onerror = () => {
    setSseState('disconnected');
    evtSrc.close();
    evtSrc = null;
    setTimeout(connectSSE, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 2, 30000);
  };
}

connectSSE();

// Uptime ticker (client-side, syncs with server status every ~30s)
let uptimeSecs = 0;
setInterval(() => {
  uptimeSecs++;
  document.getElementById('uptime').textContent = fmtUptime(uptimeSecs);
}, 1000);

// Patch applyStatus to reset client uptime counter
const _orig = applyStatus;
window.applyStatus = function(st) {
  _orig(st);
  if (st.uptime != null) uptimeSecs = st.uptime;
};
// Override global reference
</script>
</body>
</html>
